name: AI CI Triage

on:
  workflow_dispatch:
    inputs:
      run:
        description: "Optional failed CI run ID or run URL"
        required: false
        default: ""
      tail_lines:
        description: "How many log lines to include in AI context"
        required: false
        default: "200"
      package:
        description: "Comma-separated list of packages to triage (empty = infer from logs)"
        required: false
        default: ""

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.parse.outputs.packages }}
      target_run_id: ${{ steps.resolve.outputs.run_id }}
      target_run_url: ${{ steps.resolve.outputs.run_url }}
      fixer_prompt: ${{ steps.prompts.outputs.fixer }}
      verifier_prompt: ${{ steps.prompts.outputs.verifier }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve target failed run
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_INPUT="${{ inputs.run }}"
          if [ -n "$RUN_INPUT" ]; then
            if [[ "$RUN_INPUT" =~ ^[0-9]+$ ]]; then
              RUN_ID="$RUN_INPUT"
            elif [[ "$RUN_INPUT" =~ /actions/runs/([0-9]+) ]]; then
              RUN_ID="${BASH_REMATCH[1]}"
            else
              echo "Invalid run input format"
              exit 1
            fi
            RUN_URL="https://github.com/${{ github.repository }}/actions/runs/$RUN_ID"
          else
            LATEST=$(gh api "repos/${{ github.repository }}/actions/workflows/ci.yml/runs?status=failure&per_page=1" --jq '.workflow_runs[0]')
            RUN_ID=$(echo "$LATEST" | jq -r '.id')
            RUN_URL=$(echo "$LATEST" | jq -r '.html_url')
            if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
              echo "No failed ci.yml runs found"
              exit 1
            fi
          fi
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "run_url=$RUN_URL" >> "$GITHUB_OUTPUT"

      - name: Parse package list and infer if needed
        id: parse
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAIL_LINES: ${{ inputs.tail_lines }}
        run: |
          PKG="${{ inputs.package }}"
          RUN_ID="${{ steps.resolve.outputs.run_id }}"
          TAIL="${TAIL_LINES:-200}"
          
          if [ -z "$PKG" ]; then
            gh api "repos/${{ github.repository }}/actions/runs/${RUN_ID}/jobs?per_page=100" > /tmp/run-jobs.json
            FAILED_JOB_ID=$(jq '[.jobs[] | select(.conclusion == "failure")][0].id // empty' /tmp/run-jobs.json)
            
            if [ -n "$FAILED_JOB_ID" ] && [ "$FAILED_JOB_ID" != "null" ]; then
              gh api "repos/${{ github.repository }}/actions/jobs/${FAILED_JOB_ID}/logs" > /tmp/raw-logs.txt || true
              PKG=$(grep -oE 'kpkg build [a-zA-Z0-9._-]+' /tmp/raw-logs.txt | head -1 | awk '{print $3}' || echo "")
              if [ -z "$PKG" ]; then
                PKG=$(grep -oE 'Building [a-zA-Z0-9._-]+' /tmp/raw-logs.txt | head -1 | awk '{print $2}' || echo "")
              fi
            fi
            
            if [ -z "$PKG" ]; then
              echo "Could not infer package from logs"
              exit 1
            fi
          fi
          
          PACKAGES=$(echo "$PKG" | tr ',' '\n' | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "packages=$PACKAGES" >> "$GITHUB_OUTPUT"

      - name: Read prompts
        id: prompts
        run: |
          FIXER=$(cat .github/workflows/ci-triage/fixer-prompt.md)
          VERIFIER=$(cat .github/workflows/ci-triage/verifier-prompt.md)
          
          FIXER_ESCAPED=$(echo "$FIXER" | jq -Rs .)
          VERIFIER_ESCAPED=$(echo "$VERIFIER" | jq -Rs .)
          
          echo "fixer=$FIXER_ESCAPED" >> "$GITHUB_OUTPUT"
          echo "verifier=$VERIFIER_ESCAPED" >> "$GITHUB_OUTPUT"

      - name: Prepare context base
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAIL_LINES: ${{ inputs.tail_lines }}
        run: |
          mkdir -p tmp/ai-triage
          
          RUN_ID="${{ steps.resolve.outputs.run_id }}"
          RUN_URL="${{ steps.resolve.outputs.run_url }}"
          TAIL="${TAIL_LINES:-200}"
          
          gh api "repos/${{ github.repository }}/actions/runs/${RUN_ID}/jobs?per_page=100" > tmp/ai-triage/run-jobs.json
          
          FAILED_JOB_ID=$(jq '[.jobs[] | select(.conclusion == "failure")][0].id // empty' tmp/ai-triage/run-jobs.json)
          
          if [ -z "$FAILED_JOB_ID" ] || [ "$FAILED_JOB_ID" = "null" ]; then
            echo "No failed jobs found"
            exit 1
          fi
          
          gh api "repos/${{ github.repository }}/actions/jobs/${FAILED_JOB_ID}/logs" > tmp/ai-triage/raw-logs.txt || true
          
          jq -n \
            --arg runId "$RUN_ID" \
            --arg runUrl "$RUN_URL" \
            --arg logs "$(tail -n "$TAIL" tmp/ai-triage/raw-logs.txt 2>/dev/null || echo '')" \
            --arg owner "${{ github.repository_owner }}" \
            --arg repo "${{ github.event.repository.name }}" \
            --arg tail "$TAIL" \
            '{
              targetRunId: ($runId | tonumber),
              targetRunUrl: $runUrl,
              failureLogs: $logs,
              owner: $owner,
              repo: $repo,
              tailLines: ($tail | tonumber)
            }' > tmp/ai-triage/context-base.json

      - name: Upload context artifact
        uses: actions/upload-artifact@v4
        with:
          name: triage-context
          path: tmp/ai-triage/

  fix:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.prepare.outputs.packages) }}
    outputs:
      dispatch_json: ${{ steps.output.outputs.dispatch }}
      package: ${{ steps.context.outputs.package }}
      branch: ${{ steps.context.outputs.branch }}
      safe_pkg: ${{ steps.context.outputs.safe_pkg }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Configure git
        run: |
          git config --global user.email 'hi@krea.to'
          git config --global user.name 'AI Triage'

      - name: Download context
        uses: actions/download-artifact@v4
        with:
          name: triage-context
          path: tmp/ai-triage

      - name: Prepare context for package
        id: context
        run: |
          PACKAGE="${{ matrix.package }}"
          RUN_ID="${{ needs.prepare.outputs.target_run_id }}"
          RUN_URL="${{ needs.prepare.outputs.target_run_url }}"
          
          if [ -z "$PACKAGE" ]; then
            PACKAGE=$(grep -oE 'kpkg build [a-zA-Z0-9._-]+' tmp/ai-triage/raw-logs.txt | head -1 | awk '{print $3}' || echo "")
            if [ -z "$PACKAGE" ]; then
              PACKAGE=$(grep -oE 'Building [a-zA-Z0-9._-]+' tmp/ai-triage/raw-logs.txt | head -1 | awk '{print $2}' || echo "")
            fi
          fi
          
          if [ -z "$PACKAGE" ]; then
            echo "Could not infer package"
            exit 1
          fi
          
          SAFE_PKG=$(echo "$PACKAGE" | tr -cd 'a-zA-Z0-9._-')
          BRANCH="ai-triage/${SAFE_PKG}-${RUN_ID}"
          
          jq \
            --arg pkg "$PACKAGE" \
            --arg branch "$BRANCH" \
            '.package = $pkg | .branch = $branch' \
            tmp/ai-triage/context-base.json > tmp/ai-triage/context.json
          
          echo "package=$PACKAGE" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "safe_pkg=$SAFE_PKG" >> "$GITHUB_OUTPUT"

      - name: Run fixer
        uses: anomalyco/opencode/github@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ALIBABA_CODING_PLAN_API_KEY: ${{ secrets.ALIBABA_CODING_PLAN_API_KEY }}
        with:
          model: alibaba-coding-plan/glm-5
          use_github_token: true
          prompt: ${{ fromJson(needs.prepare.outputs.fixer_prompt) }}

      - name: Read dispatch output
        id: output
        run: |
          if [ -f tmp/ai-triage/dispatch.json ]; then
            DISPATCH=$(cat tmp/ai-triage/dispatch.json | jq -c .)
            echo "dispatch=$DISPATCH" >> "$GITHUB_OUTPUT"
          else
            echo "dispatch={}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload dispatch artifact
        uses: actions/upload-artifact@v4
        with:
          name: triage-dispatch-${{ steps.context.outputs.safe_pkg }}
          path: tmp/ai-triage/dispatch.json

  poll:
    needs: [prepare, fix]
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      actions: read
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.prepare.outputs.packages) }}
    outputs:
      poll_result: ${{ steps.poll.outputs.result }}
    steps:
      - name: Derive safe package name
        id: safe
        run: |
          SAFE_PKG=$(echo "${{ matrix.package }}" | tr -cd 'a-zA-Z0-9._-')
          echo "safe_pkg=$SAFE_PKG" >> "$GITHUB_OUTPUT"

      - name: Download dispatch
        uses: actions/download-artifact@v4
        with:
          name: triage-dispatch-${{ steps.safe.outputs.safe_pkg }}
          path: tmp/ai-triage
        continue-on-error: true

      - name: Check dispatch exists
        id: check
        run: |
          if [ ! -f tmp/ai-triage/dispatch.json ]; then
            echo "No dispatch.json found"
            jq -n '{status: "error", conclusion: "no_dispatch", error: "Fixer did not produce dispatch.json"}' > tmp/ai-triage/poll-result.json
            echo "result=no_dispatch" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          
          VERIFY_RUN_ID=$(jq -r '.verificationRunId // empty' tmp/ai-triage/dispatch.json)
          if [ -z "$VERIFY_RUN_ID" ] || [ "$VERIFY_RUN_ID" = "null" ]; then
            echo "dispatch.json missing verificationRunId"
            jq -n '{status: "error", conclusion: "invalid_dispatch", error: "dispatch.json missing verificationRunId"}' > tmp/ai-triage/poll-result.json
            echo "result=invalid_dispatch" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          
          echo "verify_run_id=$VERIFY_RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Poll verification run
        if: steps.check.outputs.verify_run_id != ''
        id: poll
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERIFY_RUN_ID="${{ steps.check.outputs.verify_run_id }}"
          PACKAGE="${{ matrix.package }}"
          BRANCH="${{ needs.fix.outputs.branch }}"
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          
          echo "Polling run $VERIFY_RUN_ID every 180 seconds..."
          
          ELAPSED=0
          MAX_SECONDS=10800  # 180 minutes
          
          while true; do
            RUN_DATA=$(gh api "repos/${OWNER}/${REPO}/actions/runs/${VERIFY_RUN_ID}")
            STATUS=$(echo "$RUN_DATA" | jq -r '.status')
            CONCLUSION=$(echo "$RUN_DATA" | jq -r '.conclusion // "running"')
            
            echo "[$(date)] Status: $STATUS, Conclusion: $CONCLUSION (elapsed: ${ELAPSED}s)"
            
            if [ "$STATUS" = "completed" ]; then
              echo "Run completed with conclusion: $CONCLUSION"
              
              LOGS=""
              if [ "$CONCLUSION" = "failure" ]; then
                echo "Fetching failure logs..."
                JOBS=$(gh api "repos/${OWNER}/${REPO}/actions/runs/${VERIFY_RUN_ID}/jobs?per_page=100")
                FAILED_JOB_ID=$(echo "$JOBS" | jq -r '[.jobs[] | select(.conclusion == "failure")][0].id // empty')
                
                if [ -n "$FAILED_JOB_ID" ] && [ "$FAILED_JOB_ID" != "null" ]; then
                  gh api "repos/${OWNER}/${REPO}/actions/jobs/${FAILED_JOB_ID}/logs" > /tmp/verify-logs.txt || true
                  LOGS=$(tail -n 200 /tmp/verify-logs.txt 2>/dev/null || echo "")
                fi
              fi
              
              RUN_URL="https://github.com/${OWNER}/${REPO}/actions/runs/${VERIFY_RUN_ID}"
              
              jq -n \
                --arg status "$STATUS" \
                --arg conclusion "$CONCLUSION" \
                --argjson runId "$VERIFY_RUN_ID" \
                --arg runUrl "$RUN_URL" \
                --arg pkg "$PACKAGE" \
                --arg branch "$BRANCH" \
                --arg logs "$LOGS" \
                '{status: $status, conclusion: $conclusion, verificationRunId: $runId, verificationRunUrl: $runUrl, package: $pkg, branch: $branch, logs: $logs}' \
                > tmp/ai-triage/poll-result.json
              
              RESULT=$(cat tmp/ai-triage/poll-result.json | jq -c .)
              echo "result=$RESULT" >> "$GITHUB_OUTPUT"
              break
            fi
            
            if [ "$ELAPSED" -ge "$MAX_SECONDS" ]; then
              echo "Timeout after ${ELAPSED} seconds"
              jq -n \
                --argjson runId "$VERIFY_RUN_ID" \
                --arg pkg "$PACKAGE" \
                '{status: "timeout", conclusion: "timeout", verificationRunId: $runId, package: $pkg, error: "Polling timed out after 180 minutes"}' \
                > tmp/ai-triage/poll-result.json
              echo "result=timeout" >> "$GITHUB_OUTPUT"
              break
            fi
            
            sleep 180
            ELAPSED=$((ELAPSED + 180))
          done

      - name: Upload poll result artifact
        uses: actions/upload-artifact@v4
        with:
          name: triage-poll-${{ steps.safe.outputs.safe_pkg }}
          path: tmp/ai-triage/poll-result.json

  verify:
    needs: [prepare, fix, poll]
    runs-on: ubuntu-latest
    permissions:
      actions: read
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.prepare.outputs.packages) }}
    outputs:
      verified: ${{ steps.output.outputs.verified }}
      result_json: ${{ steps.output.outputs.result }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Derive safe package name
        id: safe
        run: |
          SAFE_PKG=$(echo "${{ matrix.package }}" | tr -cd 'a-zA-Z0-9._-')
          echo "safe_pkg=$SAFE_PKG" >> "$GITHUB_OUTPUT"

      - name: Download poll result
        uses: actions/download-artifact@v4
        with:
          name: triage-poll-${{ steps.safe.outputs.safe_pkg }}
          path: tmp/ai-triage

      - name: Check poll result
        id: check
        run: |
          if [ ! -f tmp/ai-triage/poll-result.json ]; then
            echo "No poll-result.json found"
            jq -n '{verified: false, error: "No poll result"}' > tmp/ai-triage/result.json
            echo "skip_ai=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          
          STATUS=$(jq -r '.status' tmp/ai-triage/poll-result.json)
          if [ "$STATUS" = "error" ] || [ "$STATUS" = "timeout" ]; then
            echo "Poll failed or timed out"
            jq '.verified = false' tmp/ai-triage/poll-result.json > tmp/ai-triage/result.json
            echo "skip_ai=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          
          echo "skip_ai=false" >> "$GITHUB_OUTPUT"

      - name: Run verifier
        if: steps.check.outputs.skip_ai != 'true'
        uses: anomalyco/opencode/github@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ALIBABA_CODING_PLAN_API_KEY: ${{ secrets.ALIBABA_CODING_PLAN_API_KEY }}
        with:
          model: alibaba-coding-plan/glm-5
          use_github_token: true
          prompt: ${{ fromJson(needs.prepare.outputs.verifier_prompt) }}

      - name: Read result output
        id: output
        run: |
          if [ -f tmp/ai-triage/result.json ]; then
            VERIFIED=$(jq -r '.verified // false' tmp/ai-triage/result.json)
            RESULT=$(cat tmp/ai-triage/result.json | jq -c .)
            echo "verified=$VERIFIED" >> "$GITHUB_OUTPUT"
            echo "result=$RESULT" >> "$GITHUB_OUTPUT"
          else
            echo "verified=false" >> "$GITHUB_OUTPUT"
            echo "result={}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload result artifact
        uses: actions/upload-artifact@v4
        with:
          name: triage-result-${{ steps.safe.outputs.safe_pkg }}
          path: tmp/ai-triage/result.json

  pr:
    needs: [prepare, fix, verify]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.prepare.outputs.packages) }}
    if: ${{ needs.verify.outputs.result_json != '{}' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Derive safe package name
        id: safe
        run: |
          SAFE_PKG=$(echo "${{ matrix.package }}" | tr -cd 'a-zA-Z0-9._-')
          echo "safe_pkg=$SAFE_PKG" >> "$GITHUB_OUTPUT"

      - name: Download result
        uses: actions/download-artifact@v4
        with:
          name: triage-result-${{ steps.safe.outputs.safe_pkg }}
          path: tmp/ai-triage

      - name: Check verified
        id: check
        run: |
          if [ -f tmp/ai-triage/result.json ]; then
            VERIFIED=$(jq -r '.verified // false' tmp/ai-triage/result.json)
            echo "verified=$VERIFIED" >> "$GITHUB_OUTPUT"
          else
            echo "verified=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Cross-check verification
        if: steps.check.outputs.verified == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID=$(jq -r '.verificationRunId' tmp/ai-triage/result.json)
          PACKAGE="${{ matrix.package }}"
          RUN_ID_NUM="${{ needs.prepare.outputs.target_run_id }}"
          SAFE_PKG="${{ steps.safe.outputs.safe_pkg }}"
          BRANCH="ai-triage/${SAFE_PKG}-${RUN_ID_NUM}"
          
          RUN_DATA=$(gh api "repos/${{ github.repository }}/actions/runs/${RUN_ID}")
          BRANCH_DATA=$(gh api "repos/${{ github.repository }}/branches/${BRANCH}")
          
          CONCLUSION=$(echo "$RUN_DATA" | jq -r '.conclusion')
          EVENT=$(echo "$RUN_DATA" | jq -r '.event')
          WF_PATH=$(echo "$RUN_DATA" | jq -r '.path')
          RUN_BRANCH=$(echo "$RUN_DATA" | jq -r '.head_branch')
          RUN_SHA=$(echo "$RUN_DATA" | jq -r '.head_sha')
          BRANCH_SHA=$(echo "$BRANCH_DATA" | jq -r '.commit.sha')
          
          [ "$CONCLUSION" = "success" ] || exit 1
          [ "$EVENT" = "workflow_dispatch" ] || exit 1
          [[ "$WF_PATH" == *ci.yml* ]] || exit 1
          [ "$RUN_BRANCH" = "$BRANCH" ] || exit 1
          [ "$RUN_SHA" = "$BRANCH_SHA" ] || exit 1

      - name: Create PR
        if: steps.check.outputs.verified == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PACKAGE="${{ matrix.package }}"
          RUN_ID_NUM="${{ needs.prepare.outputs.target_run_id }}"
          SAFE_PKG="${{ steps.safe.outputs.safe_pkg }}"
          BRANCH="ai-triage/${SAFE_PKG}-${RUN_ID_NUM}"
          TARGET_URL="${{ needs.prepare.outputs.target_run_url }}"
          VERIFY_URL=$(jq -r '.verificationRunUrl' tmp/ai-triage/result.json)
          
          EXISTING=$(gh pr list --head "$BRANCH" --base master --json url --jq '.[0].url // ""' || true)
          
          if [ -z "$EXISTING" ]; then
            BODY_FILE=$(mktemp)
            printf '## Summary\n- AI triage fix for failed ci.yml run: %s\n- Package: %s\n- Verification run: %s\n' \
              "$TARGET_URL" "$PACKAGE" "$VERIFY_URL" > "$BODY_FILE"
            gh pr create \
              --base master \
              --head "$BRANCH" \
              --title "${PACKAGE}: AI triage fix for CI failure" \
              --body-file "$BODY_FILE"
            rm -f "$BODY_FILE"
          fi